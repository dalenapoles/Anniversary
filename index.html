<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <style>
        body{
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            column-gap: 50px;
        }
        h1{
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 549.9;
            font-size: 50px;
            color: #3f1964
         
        }
     .containerlower{
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }   
         .containerlower img{
            width: 70px;
         }

          .containerlower p{
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bolder;
            color: #3f1964 ;
          }

          .containerlower input{
            border: none;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            -ms-appearance: none;
            padding: 12px;
            border-radius: 50px;
            width: 200px;
            text-align: center;
            outline: none;
            box-shadow: 1px 1px 10px 1px  rgba(78, 20, 125, 1);
          }
          .containerlower button{
            margin-top: 20px;
            padding: 15px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
            font-weight: 900;
            border-radius: 16px;
           width: 120px;
            border: none;
            color: #3f1964;
            
          }
          .containerlower button:hover{
            cursor: pointer;
            box-shadow: 1px 1px 10px 1px  rgba(78, 20, 125, 1);
            background-color: #3f1964;
            color: white;
            transition: 0.3s;
          }
          .containerlower #error-msg{
             margin-top: 10px;
            padding: 15px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 15px;
            font-weight: 900;
            border-radius: 16px;
            position: absolute;
            bottom: 21%;
            color: #ffffff;
            
          }

         </style>
    
    <title>Secret Code</title>
   
</head>

<body>
    

     <h1>What's  <h1>The Secret Code</h1> </h1>
     <div class="containerlower">
    <p>TYPE HERE</p>
    <img src="Images/arrow.png" alt="">

    <input id="password" type="password" >
    <button id="enter">ENTER</button>
    <div id="error-msg"></div>
</div>
 <script src="index.js"></script>
</body>
</html>
